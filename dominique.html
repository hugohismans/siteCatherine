<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dominique Deschamps, Ouvertures des M'Ondes | Reiki, EFT & constellations familiales</title>
  <meta name="description" content="Dominique Deschamps, la Fée des Champs, Ouvertures des M'Ondes. Soins énergétiques (Reiki, massage métamorphique), EFT et constellations familiales en Belgique." />
  <meta name="author" content="Dominique Deschamps" />
  <meta name="robots" content="index, follow" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Dominique Deschamps, Ouvertures des M'Ondes" />
  <meta property="og:description" content="Soins énergétiques, Reiki, EFT et constellations familiales." />
  <meta property="og:image" content="images/photo-dominique.png" />
  <meta property="og:locale" content="fr_BE" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Great+Vibes&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-dominique">

  <!-- NAV -->
  <header class="nav-header">
    <nav class="nav-inner">
      <a href="dominique.html" class="nav-brand">
        <span>
          <span class="nav-brand-script">Ouvertures des M'Ondes</span>
          <span class="nav-brand-sub">Dominique Deschamps</span>
        </span>
      </a>
      <ul class="nav-links">
        <li><a href="#presentation">Présentation</a></li>
        <li><a href="#soins">Soins</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><a href="index.html" class="nav-btn">← Accueil</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Menu">☰</button>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero" id="hero">
    <div class="hero-content">
      <p class="hero-eyebrow" data-key="hero.eyebrow"></p>
      <h1 class="hero-title" data-key="hero.title_html" data-html></h1>
      <p class="hero-subtitle" data-key="hero.subtitle"></p>
      <div class="hero-cta">
        <a href="#rdv" class="btn btn-primary" data-key="hero.cta_primary"></a>
        <a href="#soins" class="btn btn-ghost" data-key="hero.cta_secondary"></a>
      </div>
    </div>
  </section>

  <!-- PRÉSENTATION -->
  <section class="section" id="presentation">
    <div class="container">
      <div class="presentation-grid">
        <div class="presentation-image-wrap fade-in">
          <img data-key="presentation.photo" data-attr="src" alt="Dominique Deschamps" class="presentation-image" />
        </div>
        <div class="presentation-text">
          <p class="section-eyebrow" data-key="presentation.eyebrow"></p>
          <h2 class="section-title" data-key="presentation.title"></h2>
          <div data-key="presentation.paragraphs" data-list="p"></div>
          <p class="presentation-signature" data-key="presentation.signature"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- SOINS -->
  <section class="section section-alt" id="soins">
    <div class="container">
      <p class="section-eyebrow center" data-key="soins.eyebrow"></p>
      <h2 class="section-title center" data-key="soins.title"></h2>
      <p class="section-intro center" data-key="soins.intro"></p>

      <div class="prestations-grid" id="soins-grid"></div>
    </div>
  </section>

  <!-- RDV -->
  <section class="section" id="rdv">
    <div class="container">
      <p class="section-eyebrow center" data-key="rdv.eyebrow"></p>
      <h2 class="section-title center" data-key="rdv.title"></h2>
      <p class="section-intro center" data-key="rdv.intro"></p>

      <div class="rdv-box fade-in">
        <a target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-large" data-key="rdv.calendly_url" data-attr="href">
          <span data-key="rdv.cta"></span>
        </a>
        <p class="rdv-note">Annulation gratuite jusqu'à 48 h avant le rendez-vous.</p>
      </div>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="section section-alt" id="contact">
    <div class="container contact-grid">
      <div class="contact-info">
        <p class="section-eyebrow" data-key="contact.eyebrow"></p>
        <h2 class="section-title" data-key="contact.title"></h2>
        <p data-key="contact.intro"></p>
        <ul class="contact-details" id="contact-details"></ul>
      </div>

      <div class="contact-form-wrap">
        <form method="POST" class="contact-form" id="contact-form">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Prénom &amp; Nom</label>
              <input type="text" id="name" name="name" required placeholder="Jeanne Dupont" />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required placeholder="jeanne@exemple.be" />
            </div>
          </div>

          <div class="form-group">
            <label for="phone">Téléphone <span class="optional">(optionnel)</span></label>
            <input type="tel" id="phone" name="phone" placeholder="0400 00 00 00" />
          </div>

          <div class="form-group">
            <label for="subject">Objet</label>
            <select id="subject" name="subject">
              <option value="">Sélectionnez...</option>
              <option value="reiki">Soin Reiki</option>
              <option value="metamorphique">Massage métamorphique</option>
              <option value="constellation">Constellation familiale</option>
              <option value="eft">EFT</option>
              <option value="autre">Autre</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required placeholder="Votre message..."></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-full">Envoyer le message</button>
        </form>
      </div>
    </div>
  </section>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <button class="modal-close" aria-label="Fermer">×</button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer-inner">
      <p class="footer-brand">Ouvertures des M'Ondes</p>
      <p class="footer-tagline">Dominique Deschamps, la Fée des Champs</p>
      <nav class="footer-nav">
        <a href="index.html">Accueil duo</a>
        <a href="#soins">Mes soins</a>
        <a href="catherine.html">Soleil de l'Une</a>
        <a href="#contact">Contact</a>
      </nav>
      <p class="footer-copy" data-key="footer.copyright"></p>
    </div>
  </footer>

  <script>window.PAGE_KEY = 'dominique';</script>
  <script src="script.js"></script>
</body>
</html>
